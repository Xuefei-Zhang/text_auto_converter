#
# *************************************************************************
#                       Configuration for Sensing USB Card
#                MAX9296 + MAX96717 + OX08D10 (4K 30fps HDR)
# *************************************************************************
#

#
# MAX96717G (Serializer) Config - I2C Address: 0x84
#
I2CADDR= 0x84
MODE= 16BITREG_BYTEWRITE
REG= 0x000d,0xbf                // 确认 ID 并保持活跃
REG= 0x0330,0x00                // 清除 MIPI 接收器状态
DELAY= 100

#
# MAX9296 (Deserializer) Config - I2C Address: 0x90
#
I2CADDR= 0x90
MODE= 16BITREG_BYTEWRITE
REG= 0x0001,0x42                // 开启 I2C 穿透总开关 (IIC_1_EN)
REG= 0x0003,0x00                // 释放所有端口对 Link A/B 的访问权限
REG= 0x0007,0xF0                // 设置交叉访问，确保 I2C1 端口可控远端

# 核心路由设置：由于 0x13=EA，必须将数据流从物理 B 口导向 CSI 输出
REG= 0x00F0,0x01                // 将视频管道 Pipe 0 映射至 PHY B
REG= 0x0004,0x01                // 使能视频数据传输管道 0
REG= 0x0313,0x02                // 开启 CSI-2 物理层输出 (CSI_OUT_EN)
DELAY= 100

#
# OX08D10 Sensor Config - I2C Address: 0x6C
#
I2CADDR= 0x6C
MODE= 16BITREG_BYTEWRITE

# --- 软件复位与时钟准备 ---
REG= 0x0100, 0x00               // 进入待机
REG= 0x0107, 0x01               // 执行软件复位
DELAY= 10                      // 必须等待 OTP 加载

# --- 核心 PLL 与 MIPI 时序配置 (1100Mbps) ---
REG= 0x4837, 0x0e               // MIPI PCLK 周期
REG= 0x0303, 0x01               // PLL1_Prediv
REG= 0x0304, 0x01               // PLL1_Multiplier H
REG= 0x0305, 0x13               // PLL1_Multiplier L
REG= 0x0362, 0xaa               // 系统时钟扩展配置

# --- 开启模拟核心时钟 (关键修正) ---
REG= 0x301E, 0xb4               // 使能 Counter clock 和 DAC clock (Bit 2=1)

# --- 图像尺寸与精准 VTS (30.03 fps) ---
REG= 0x380e, 0x05               // VTS High (1372 = 0x055C)
REG= 0x380f, 0x5c               // VTS Low

# --- 加载 ASIL 与数据格式 (HDR4 PWL12) ---
REG= 0x431c, 0x2a               // 配置 RAW12 且开启 PWL 压缩
REG= 0x4613, 0x09               // VFIFO CRC 使能
REG= 0x507a, 0xad               // 安全校验 Golden Data 0
REG= 0x507b, 0xf1               // 安全校验 Golden Data 1

# --- 传感器内部量化阵列配置 (KickStart) ---
# 这些寄存器确保 ADC 能够从初始化态迁移到运行态
REG= 0x374f, 0x40
REG= 0x3750, 0xc3
REG= 0x3751, 0x60
REG= 0x3752, 0x4e

# --- 加载 0x6A/0x6B 核心逻辑块 ---
# 注意：若未全量加载 vendor txt 中的 6aXX 范围寄存器，gmac_state 将卡死在 0x00
REG= 0x6a04, 0x08
REG= 0x6a05, 0x02
REG= 0x6a07, 0x16

# --- 启动看门狗并退出待机 (StreamOn) ---
REG= 0x4f05, 0xf8               // 【关键】发送至 0x6C，触发 ASIL 状态机
REG= 0x0100, 0x01               // 正式启动 Streaming

# -------------------------------------------------------------------------
# Debug Verification (读取回读)
# -------------------------------------------------------------------------
I2CADDR= 0x6C
REG= 0x1059, 0x00               // 期望读取：0x81 (Bit 0=1 代表 Operational)

I2CADDR= 0x90
REG= 0x0108, 0x00               // 期望读取：Bit 6=1 (VID_LOCK)
REG= 0x08d2, 0x00               // 期望回读：数值在不断变化 (物理包活动)
