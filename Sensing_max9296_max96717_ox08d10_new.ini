#
# MAX96717 (Serializer) Config - I2C Address: 0x84
#
I2CADDR= 0x84
MODE= 16BITREG_BYTEWRITE
REG= 0x0057,0x12                // 基础GMSL2链路配置
REG= 0x005B,0x11
REG= 0x0318,0x00
REG= 0x0331,0x11
DELAY= 200

#
# MAX9296 (Deserializer) Config - I2C Address: 0x90
#
I2CADDR= 0x90                   
MODE= 16BITREG_BYTEWRITE        
REG= 0x0320,0x3F                // MIPI 速率调整，1100Mbps建议调高此范围
REG= 0x0313,0x02                // MIPI enable
DELAY= 200

#
# OX08D10 Sensor Config - I2C Address: 0x6C
#
