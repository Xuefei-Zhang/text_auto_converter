# ub954 I2C address: 0x7A(8-bit)
# ub953 I2C address: 0x30(8-bit)
# ar0820 I2C address: 0x20(8-bit)
#
# MIPI
# mclk: 27Mhz
# 3840x2160 @ 15fps RAW12
#

// 954 config
MODE= 8BITREG_BYTEWRITE
I2CADDR= 0x7A
REG= 0x01, 0x02		// 复位954
DELAY= 100
REG= 0x4C, 0x01		// 选择port0
REG= 0x20, 0x20		// 使能port0 forwarding
REG= 0x58, 0x5E
REG= 0x5C, 0x30		// 设置953 I2C地址别名
REG= 0x5D, 0x20		// 设置模组 I2C地址
REG= 0x65, 0x20		// 设置模组 I2C地址别名
REG= 0x1F, 0x02		// mipi lane rate 800Mbps
REG= 0x33, 0x03		// 使能mipi输出，4-lane，连续时钟模式
DELAY= 100

// 953 config
MODE= 8BITREG_BYTEWRITE
I2CADDR= 0x30
REG= 0x01, 0x02		// 复位953
DELAY= 100
REG= 0x02, 0x73		// mipi 4-lane, 连续时钟模式
REG= 0x0D, 0xD2		// GPIO1拉高复位模组(如果有)
REG= 0x0E, 0x2D

// ub953 output 27Mhz to Sensor
MODE= 8BITREG_BYTEWRITE
I2CADDR= 0x30
REG= 0x06, 0x9B
REG= 0x07, 0xFA
DELAY= 500

// Sensor config
MODE= 16BITREG_WORDWRITE
