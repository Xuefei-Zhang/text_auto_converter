#
# *************************************************************************
#                       Configuration for Sensing USB Card
#                MAX9296 + MAX96716 + OX08D10 (4K 30fps HDR)
# *************************************************************************
#

#
# MAX96716 (Serializer) Config - I2C Address: 0x84
# NOTE: Runtime debug indicates MAX96716 + OX08D10 is connected on Deserializer Port B.
#
I2CADDR= 0x84
MODE= 16BITREG_BYTEWRITE
REG= 0x0057,0x12                // 基础GMSL2链路配置
REG= 0x005B,0x11
REG= 0x0318,0x00
REG= 0x0331,0x11
DELAY= 200

#
# MAX9296 (Deserializer) Config - I2C Address: 0x90
#
I2CADDR= 0x90
MODE= 16BITREG_BYTEWRITE
REG= 0x0320,0x3F                // MIPI 速率调整，1100Mbps建议调高此范围
REG= 0x0313,0x02                // MIPI enable

# --- Port B link / CSI routing (MAX96716 + OX08D10 on Port B) ---
# Enable link on Port B and route Port B video to CSI output.
# NOTE: Register meanings should be verified against MAX9296A datasheet.
REG= 0x0010,0x22                // Port B enable / link configuration (Port B)
REG= 0x0050,0x01                // Select Port B as video source to CSI
REG= 0x0314,0x01                // CSI output enable / route map update
DELAY= 200

#
# OX08D10 Sensor Config - I2C Address: 0x6C
#
I2CADDR= 0x6C
MODE= 16BITREG_BYTEWRITE

# --- Initial Setup ---
REG= 0x0100, 0x00
REG= 0x0040, 0x00
REG= 0x00a0, 0x1000
# set XCLK to 24mhz
REG= 0x00c0, 0x2400
REG= 0x0020, 0x10
REG= 0x0080, 0x01
REG= 0x0081, 0x00
REG= 0x0082, 0xf00
REG= 0x0083, 0x870

# --- Software Reset ---
REG= 0x0107, 0x01
DELAY= 10

